<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toyota">
<title>Toyota · Mantenimiento</title>
<style>
:root{--toyota:#eb0a1e;--toyota-dim:#9a0614;--bg:#0d0f14;--surface:#161921;--surface2:#1e2330;--border:#2a2f3f;--text:#e8eaf0;--muted:#6b7280;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--accent:#3b82f6;--font:-apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{background:var(--toyota);padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;flex-shrink:0;}
header h1{font-size:16px;font-weight:700;color:white;flex:1;}
.hdr-km{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);}
.page{max-width:480px;margin:0 auto;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 40px);}
.save-bar{font-size:11px;color:var(--muted);text-align:right;min-height:16px;margin-bottom:6px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.card-accent{border-top:3px solid var(--toyota);}
.card-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:block;}
.km-row{display:flex;gap:8px;}
.km-wrap{flex:1;position:relative;}
.km-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:26px;font-weight:600;padding:11px 44px 11px 14px;outline:none;-webkit-appearance:none;}
.km-wrap input:focus{border-color:var(--toyota);}
.km-unit{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;}
.btn-red{background:var(--toyota);color:white;border:none;border-radius:10px;padding:11px 18px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-appearance:none;min-height:48px;}
.btn-red:active{background:var(--toyota-dim);}
.update-info{font-size:12px;color:var(--muted);margin-top:10px;}
.media-info{font-size:11px;color:var(--muted);margin-top:6px;}
.alert{border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;font-weight:500;display:none;gap:8px;align-items:flex-start;}
.alert.show-danger{display:flex;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.alert.show-warn{display:flex;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);color:#fcd34d;}
.section-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;}
.maint-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.maint-head{padding:13px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);}
.maint-name{font-size:14px;font-weight:700;}
.maint-desc{font-size:11px;color:var(--muted);margin-top:3px;}
.badge{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-ok{background:rgba(34,197,94,0.15);color:#4ade80;}
.badge-warn{background:rgba(245,158,11,0.15);color:#fbbf24;}
.badge-danger{background:rgba(239,68,68,0.15);color:#f87171;}
.badge-next{background:rgba(249,115,22,0.15);color:#fb923c;}
.maint-body{padding:13px 16px;}
.progress-wrap{height:4px;background:var(--bg);border-radius:2px;margin-bottom:13px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}
.fill-ok{background:var(--ok);}.fill-warn{background:var(--warn);}.fill-danger{background:var(--danger);}.fill-next{background:#f97316;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.stat{display:flex;flex-direction:column;gap:3px;}
.stat-val{font-size:15px;font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.c-ok{color:var(--ok);}.c-warn{color:var(--warn);}.c-danger{color:var(--danger);}.c-next{color:#f97316;}
.info-row{margin-top:11px;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
.info-lbl{font-size:12px;color:var(--muted);}
.info-val{font-size:14px;font-weight:700;}
.cita-row{margin-top:8px;padding:10px 13px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
.cita-lbl{font-size:12px;color:var(--accent);}
.cita-val{font-size:13px;font-weight:700;color:var(--accent);}
.btn-maint{margin-top:11px;width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:13px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;min-height:48px;}
.btn-maint:active{background:var(--border);}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hist-km{font-size:15px;font-weight:700;}
.hist-date{font-size:11px;color:var(--muted);margin-top:2px;}
.hist-diff{font-size:13px;font-weight:600;color:var(--accent);text-align:right;}
.hist-nota{font-size:10px;color:var(--muted);text-align:right;margin-top:2px;}
.muted-txt{color:var(--muted);font-size:13px;padding:4px 0;}
.reset-wrap{text-align:center;margin-top:28px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 20px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;min-height:44px;}
.btn-ghost:active{border-color:var(--danger);color:var(--danger);}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">T</div>
  <h1>Mantenimiento Toyota</h1>
  <span class="hdr-km" id="hdr-km">— km</span>
</header>
<div class="page">
  <div class="save-bar" id="save-bar"></div>
  <div id="alert-danger" class="alert"></div>
  <div id="alert-warn" class="alert"></div>
  <div class="card card-accent">
    <span class="card-label">Kilometraje actual del vehículo</span>
    <div class="km-row">
      <div class="km-wrap">
        <input type="number" id="km-input" inputmode="numeric" placeholder="529406">
        <span class="km-unit">km</span>
      </div>
      <button class="btn-red" onclick="updateKm()">Actualizar</button>
    </div>
    <div class="update-info" id="update-info">Cargando...</div>
    <div class="media-info" id="media-info"></div>
  </div>
  <div class="section-title">Mantenimiento por km</div>
  <div id="maint-cards"></div>
  <div class="section-title">ITV y fechas</div>
  <div id="itv-card"></div>
  <div class="section-title">Historial de registros</div>
  <div id="hist-list"></div>
  <div class="reset-wrap">
    <button class="btn-ghost" onclick="confirmReset()">↺ Reiniciar datos</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const LS_KEY='toyota_taxi_v5',WARN_KM=5000,WARN_ITV_DIAS=30;
const SEED={currentKm:529406,lastUpdate:'01/07/2026',itvProxima:'2026-11-26',piezas:[
{id:'aceite',emoji:'🔧',nombre:'Aceite motor + filtros',desc:'Aceite 0W20 · filtro aceite, aire, cabina',ultimoKm:528229,intervalo:15000},
{id:'neum_del',emoji:'🛞',nombre:'Neumáticos delanteros',desc:'Intervalo recomendado 40.000 km',ultimoKm:493715,intervalo:40000},
{id:'neum_tras',emoji:'🛞',nombre:'Neumáticos traseros',desc:'Intervalo recomendado 40.000 km',ultimoKm:493715,intervalo:40000},
{id:'past_del',emoji:'🔴',nombre:'Pastillas freno DEL.',desc:'Líquido de frenos incluido en cada cambio',ultimoKm:528229,intervalo:37500},
{id:'past_tras',emoji:'🔴',nombre:'Pastillas freno TRAS.',desc:'Líquido de frenos incluido en cada cambio',ultimoKm:372533,intervalo:150000},
{id:'discos_del',emoji:'⚙️',nombre:'Discos freno DEL.',desc:'Intervalo recomendado 150.000 km',ultimoKm:493715,intervalo:150000},
{id:'refrigerante',emoji:'💧',nombre:'Líquido refrigerante',desc:'Motor nuevo instalado ~494.000 km',ultimoKm:494000,intervalo:60000},
{id:'bujias',emoji:'✨',nombre:'Bujías de iridio',desc:'Motor nuevo instalado ~494.000 km',ultimoKm:494000,intervalo:120000}
],history:[
{km:529406,fecha:'01/07/2026',ts:1751385600000,nota:''},
{km:528229,fecha:'29/06/2026',ts:1751212800000,nota:'Aceite motor + filtros · Pastillas freno DEL.'},
{km:523543,fecha:'22/06/2026',ts:1750608000000,nota:''},
{km:518184,fecha:'16/06/2026',ts:1750089600000,nota:''},
{km:514052,fecha:'09/06/2026',ts:1749427200000,nota:'Revisión general + aceite'},
{km:512811,fecha:'08/06/2026',ts:1749373380000,nota:''},
{km:508381,fecha:'01/06/2026',ts:1748773440000,nota:''},
{km:504633,fecha:'26/05/2026',ts:1748250300000,nota:''},
{km:496356,fecha:'11/05/2026',ts:1746954480000,nota:''}
]};

let D=null;
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
function fmt(n){return Math.abs(Math.round(n)).toLocaleString('es-ES');}
function setSaveBar(t){const e=document.getElementById('save-bar');if(e)e.textContent=t;}

// Usa solo los 2 últimos registros para capturar el ritmo actual
function calcKmPorDia(){
  if(!D||!D.history||D.history.length<2)return null;
  const h=D.history;
  // Busca los 2 registros más recientes con al menos 1 día de diferencia
  for(let i=0;i<Math.min(h.length-1,5);i++){
    const dias=(h[i].ts-h[i+1].ts)/(1000*60*60*24);
    const km=h[i].km-h[i+1].km;
    if(dias>=1&&km>0) return km/dias;
  }
  return null;
}

function calcFechaEstimada(kmRestantes){
  const kmDia=calcKmPorDia();
  if(!kmDia||kmRestantes<=0)return null;
  // Avisar 7 días antes de que toque
  const diasRestantes=Math.max(0,(kmRestantes/kmDia)-7);
  return new Date(Date.now()+diasRestantes*1000*60*60*24);
}

function fmtFecha(d){
  if(!d)return null;
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
}

function loadData(){
  const raw=lsGet(LS_KEY);
  if(raw){
    D=JSON.parse(raw);
    const ids=D.piezas.map(p=>p.id);
    SEED.piezas.forEach(sp=>{if(!ids.includes(sp.id))D.piezas.push(sp);});
    if(!D.itvProxima)D.itvProxima='2026-11-26';
  }else{
    D=JSON.parse(JSON.stringify(SEED));
    lsSet(LS_KEY,JSON.stringify(D));
  }
  render();
}

function saveData(){lsSet(LS_KEY,JSON.stringify(D));setSaveBar('✓ Guardado');setTimeout(()=>setSaveBar(''),1800);}

function updateKm(){
  const input=document.getElementById('km-input');
  const val=parseInt(input.value);
  if(!val||val<1000){showToast('⚠ Introduce un km válido');return;}
  if(D.currentKm&&val<D.currentKm){showToast('⚠ El km no puede ser menor al anterior');return;}
  const now=new Date();
  const fecha=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  D.history.unshift({km:val,fecha,ts:now.getTime(),nota:''});
  D.currentKm=val;D.lastUpdate=fecha;
  input.value='';saveData();
  showToast('✓ '+fmt(val)+' km registrados');render();
}

function marcarRealizado(id){
  const p=D.piezas.find(x=>x.id===id);
  if(!p||!D.currentKm)return;
  const km=D.currentKm;
  p.ultimoKm=km;
  const top=D.history[0];
  if(top&&top.km===km){top.nota=top.nota?top.nota+' · '+p.nombre:p.nombre;}
  else{const now=new Date();const fecha=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});D.history.unshift({km,fecha,ts:now.getTime(),nota:p.nombre});}
  saveData();showToast('✓ '+p.nombre+' registrado a '+fmt(km)+' km');render();
}

function renovarItv(){
  const d=new Date(D.itvProxima);d.setFullYear(d.getFullYear()+1);
  D.itvProxima=d.toISOString().slice(0,10);
  saveData();showToast('✓ ITV renovada');renderItv();
}

function confirmReset(){
  if(confirm('¿Borrar todos los datos?')){
    lsDel(LS_KEY);D=JSON.parse(JSON.stringify(SEED));
    lsSet(LS_KEY,JSON.stringify(D));render();showToast('Datos reiniciados');
  }
}

function getStatus(p,km){
  if(!km)return{estado:'Sin datos',bCls:'badge-ok',fCls:'fill-ok',vCls:'',rest:null,pct:0,proxKm:null};
  const proxKm=p.ultimoKm+p.intervalo,rest=proxKm-km;
  const pct=Math.min(((km-p.ultimoKm)/p.intervalo)*100,100);
  let estado,bCls,fCls,vCls;
  if(rest<=0){estado='¡VENCIDO!';bCls='badge-danger';fCls='fill-danger';vCls='c-danger';}
  else if(rest<=WARN_KM){estado='Agendar ya';bCls='badge-warn';fCls='fill-warn';vCls='c-warn';}
  else if(rest<=15000){estado='Próximo';bCls='badge-next';fCls='fill-next';vCls='c-next';}
  else{estado='OK';bCls='badge-ok';fCls='fill-ok';vCls='c-ok';}
  return{estado,bCls,fCls,vCls,rest,pct,proxKm};
}

function render(){
  const km=D.currentKm;
  document.getElementById('hdr-km').textContent=km?fmt(km)+' km':'— km';
  document.getElementById('update-info').textContent=D.lastUpdate?'Última actualización: '+D.lastUpdate:'Sin datos aún';
  const kmDia=calcKmPorDia();
  const mediaEl=document.getElementById('media-info');
  if(mediaEl&&kmDia)mediaEl.textContent='Ritmo actual: ~'+Math.round(kmDia)+' km/día · ~'+Math.round(kmDia*7)+' km/semana';
  renderAlerts(km);renderMaint(km);renderItv();renderHist();
}

function renderAlerts(km){
  const de=document.getElementById('alert-danger'),we=document.getElementById('alert-warn');
  de.className='alert';we.className='alert';
  if(!km)return;
  const venc=D.piezas.filter(p=>(p.ultimoKm+p.intervalo)-km<=0);
  const prox=D.piezas.filter(p=>{const r=(p.ultimoKm+p.intervalo)-km;return r>0&&r<=WARN_KM;});
  if(venc.length){de.className='alert show-danger';de.innerHTML='🔴 Vencido: '+venc.map(p=>p.nombre).join(', ');}
  if(prox.length){we.className='alert show-warn';we.innerHTML='🟡 Menos de '+fmt(WARN_KM)+' km: '+prox.map(p=>p.nombre).join(', ');}
}

function renderMaint(km){
  document.getElementById('maint-cards').innerHTML=D.piezas.map(p=>{
    const s=getStatus(p,km);
    const fechaEst=s.rest&&s.rest>0?calcFechaEstimada(s.rest):null;
    const citaHtml=fechaEst?`<div class="cita-row"><span class="cita-lbl">📅 Pide cita antes del</span><span class="cita-val">${fmtFecha(fechaEst)}</span></div>`:'';
    const btn=km?`<button class="btn-maint" onclick="marcarRealizado('${p.id}')">✓ Marcar realizado a ${fmt(km)} km</button>`:'';
    return `<div class="maint-card">
      <div class="maint-head">
        <div><div class="maint-name">${p.emoji} ${p.nombre}</div><div class="maint-desc">${p.desc}</div></div>
        <span class="badge ${s.bCls}">${s.estado}</span>
      </div>
      <div class="maint-body">
        <div class="progress-wrap"><div class="progress-fill ${s.fCls}" style="width:${s.pct}%"></div></div>
        <div class="stats-grid">
          <div class="stat"><span class="stat-val ${s.vCls}">${km&&s.proxKm?fmt(s.proxKm)+' km':'—'}</span><span class="stat-lbl">Próximo a</span></div>
          <div class="stat"><span class="stat-val ${s.vCls}">${s.rest!==null?(s.rest>0?fmt(s.rest)+' km':'¡Ya!'):'—'}</span><span class="stat-lbl">Km restantes</span></div>
          <div class="stat"><span class="stat-val">${fmt(p.intervalo)} km</span><span class="stat-lbl">Intervalo</span></div>
        </div>
        <div class="info-row"><span class="info-lbl">Último cambio</span><span class="info-val">${fmt(p.ultimoKm)} km</span></div>
        ${citaHtml}
        ${btn}
      </div>
    </div>`;
  }).join('');
}

function renderItv(){
  const hoy=new Date(),proxima=new Date(D.itvProxima);
  const dias=Math.ceil((proxima-hoy)/86400000);
  const pct=Math.max(0,Math.min(100,((365-dias)/365)*100));
  let estado,bCls,fCls,vCls,extra='';
  if(dias<=0){estado='¡Vencida!';bCls='badge-danger';fCls='fill-danger';vCls='c-danger';extra=`<button class="btn-maint" onclick="renovarItv()">✓ Marcar ITV renovada (+1 año)</button>`;}
  else if(dias<=WARN_ITV_DIAS){estado='Pedir cita';bCls='badge-warn';fCls='fill-warn';vCls='c-warn';}
  else{estado='OK';bCls='badge-ok';fCls='fill-ok';vCls='c-ok';}
  document.getElementById('itv-card').innerHTML=`<div class="maint-card">
    <div class="maint-head">
      <div><div class="maint-name">📋 ITV</div><div class="maint-desc">Inspección técnica anual · Taxi</div></div>
      <span class="badge ${bCls}">${estado}</span>
    </div>
    <div class="maint-body">
      <div class="progress-wrap"><div class="progress-fill ${fCls}" style="width:${pct}%"></div></div>
      <div class="stats-grid">
        <div class="stat"><span class="stat-val ${vCls}">${proxima.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}</span><span class="stat-lbl">Fecha límite</span></div>
        <div class="stat"><span class="stat-val ${vCls}">${dias>0?dias:'¡Ya!'}</span><span class="stat-lbl">Días restantes</span></div>
        <div class="stat"><span class="stat-val">Anual</span><span class="stat-lbl">Intervalo</span></div>
      </div>${extra}
    </div>
  </div>`;
}

function renderHist(){
  const h=D.history||[],el=document.getElementById('hist-list');
  if(!h.length){el.innerHTML='<div class="muted-txt">Sin registros todavía.</div>';return;}
  el.innerHTML=h.slice(0,10).map((e,i)=>{
    const prev=h[i+1],diff=prev?e.km-prev.km:null;
    return `<div class="hist-item">
      <div><div class="hist-km">${fmt(e.km)} km</div><div class="hist-date">${e.fecha}</div></div>
      <div><div class="hist-diff">${diff!==null?'+'+fmt(diff)+' km':'primer reg.'}</div>${e.nota?`<div class="hist-nota">${e.nota}</div>`:''}</div>
    </div>`;
  }).join('');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
document.getElementById('km-input').addEventListener('keydown',e=>{if(e.key==='Enter')updateKm();});
loadData();
</script>
</body>
</html>
